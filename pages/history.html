<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sniglet:wght@400;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../style.css">

</head>

<body>

    <header>

        <nav class="navbar">

            <div class="logo"></div>

            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="recipe.html">Make Recipe</a></li>
                <li><a href="history.html" class="active">History</a></li>
            </ul>
        </nav>
    </header>

    <main class="history-page">

        <h1>Saved Recipes</h1>

        <div class="history-controls">

            <input
            type="text"
            id="searchInput"
            placeholder="Search recipes here..blehh:P">

            <br><br>

            <select id="sortSelect">

                <option value="newest">Newest First</option>

                <option value="oldest">Oldest First</option>

                <option value="az">A to Z</option>

                <option value="za">z to A</option>
            </select>
            <br><br>
            
            <button id="clearHistoryBtn" class="clear-history-btn">
                CLEAR ALL RECIPES
            </button>

            <button id="showFavBtn" class="fav-filter-btn">
                SHOW FAVOURITES ❤️
            </button>
        </div>

        <div id="historyContainer"></div>

        <div id="pagination"></div>

        </main>

        <footer class="footer">
            <p>Created by <strong>Sunshine and Rainbows (Texi)</strong></p>
        </footer>

        <script src="../script.js"></script>


</body>
</html>
